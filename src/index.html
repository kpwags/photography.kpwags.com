---
layout: "layouts/layout.html"
title: Photography
---

<section class="photoset-list">
	<ul>
		{% for photoset in photosets %}
			<li>
				<a href="{{ photoset.link }}" class="photoset-link">
					<img
						src="/images/photoset-links/{{ photoset.cover }}"
						alt="{{ photoset.coverAltText }}"
						width="1920"
						height="1193"
					/>
					<div class="overlay">
						<h2>{{ photoset.title }}</h2>
						<div class=""meta">{{ photoset.displayDate }} &bull; {{ photoset.photos }} Photos</div>
					</div>
				</a>
			</li>
		{% endfor %}
	</ul>
</section>
