<script>
	function isDarkMode() {
		const prefferredMode = window.matchMedia('(prefers-color-scheme: dark)');

		if (prefferredMode.matches) {
			return true;
		}

		return false;
	}

	function getPrimaryColor(theme) {
		switch (theme) {
			case 'dark':
				return 'oklch(0.6811 0.168 261.68)';
			case 'sepia':
				return 'oklch(0.2567 0.0197 73.06)';
			case 'red':
				return 'oklch(51.18% 0.222 26.47)';
			case 'orange':
				return 'oklch(0.7162 0.1455 57.71)';
			case 'yellow':
				return 'oklch(0.8809 0.1677 104.29)';
			case 'green':
				return 'oklch(0.5779 0.1554 150.88)';
			case 'blue':
				return 'oklch(0.4779 0.2023 263.12)';
			case 'purple':
				return 'oklch(0.5515 0.1727 319.24)';
			case 'light':
			default:
				return 'oklch(0.4102 0.238 264.68)';
		}
	}

	function setTheme() {
		let isSystem = false;
		let theme = window.localStorage.getItem('data-theme');

		if (!theme) {
			isSystem = true;
			theme = isDarkMode() ? 'dark' : 'light';
		}

		document.querySelector('meta[name="theme-color"]')?.setAttribute('content', getPrimaryColor(theme));
		document.documentElement.setAttribute('data-theme', theme);
		document.themeControls.colorTheme.value = isSystem ? 'system' : theme;
	}

	function resetTheme() {
		window.localStorage.removeItem('data-theme');

		const theme = isDarkMode() ? 'dark' : 'light';

		document.querySelector('meta[name="theme-color"]')?.setAttribute('content', getPrimaryColor(theme));
		document.documentElement.setAttribute('data-theme', theme);
		document.themeControls.colorTheme.value = 'system';
	}

	function changeTheme(theme) {
		if (theme === 'system') {
			resetTheme();
			return;
		}

		window.localStorage.setItem('data-theme', theme);

		document.querySelector('meta[name="theme-color"]')?.setAttribute('content', getPrimaryColor(theme));
		document.documentElement.setAttribute('data-theme', theme);
		document.themeControls.colorTheme.value = theme;
	}

</script>
